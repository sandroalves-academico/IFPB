            <!-- Itens do menu -->

    <!-- Formulário -->
    

    <main class="container mt-5">

        <div class="card shadow">

            <!-- Cabeçalho -->

            <div class="card-header bg-primary text-white text-center">

                <h1 class="h4 mb-0">
                    Formulário Para Contato
                </h1>

            </div>

            <div class="card-body">

                <form>

                    <!-- Nome -->

                    <div class="mb-3">

                        <label class="form-label">
                            Nome completo:
                        </label>

                        <input 
                            type="text" 
                            class="form-control"
                            placeholder="Digite seu nome"
                        >

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">
                            Email:
                        </label>

                        <input 
                            type="email" 
                            class="form-control"
                            placeholder="Digite seu email"
                        >

                    </div>

                    <!-- Telefone -->

                    <div class="mb-3">

                        <label class="form-label">
                            Telefone:
                        </label>

                        <input 
                            type="tel" 
                            class="form-control"
                            placeholder="Digite seu telefone"
                        >

                    </div>

                    <!-- Mensagem -->

                    <div class="mb-3">

                        <label class="form-label">
                            Assunto:
                        </label>

                        <textarea 
                            class="form-control" 
                            rows="4"
                            placeholder="Digite sua mensagem"
                        ></textarea>

                    </div>

                    <!-- Botões -->

                    <div class="d-flex gap-2">

                        <button 
                            type="submit" 
                            class="btn btn-primary"
                        >
                            Enviar
                        </button>

                        <button 
                            type="reset" 
                            class="btn btn-secondary"
                        >
                            Limpar
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

    <!-- BOOTSTRAP JS -->

    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
